name: dino
description: "Dino is an AI-powered food court app that brings healthy, modern dining to the stone age with the slogan Yabba Dabba Dish! Built with Flutter Generative UI, it transforms nutritious eating into a fun, collaborative experience by letting groups order from multiple virtual stalls through one chat. Users simply state their health goals or cravings, and the AI instantly generates interactive, prehistoric-themed widgets to customize vitamin-rich, caveman-sized portions cooked with clean, modern techniques."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  genui: ^0.9.2
  googleai_dart: ^8.0.0
  json_schema_builder: ^0.1.5
  openai_dart: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.1
  very_good_analysis: ^10.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/
